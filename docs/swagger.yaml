basePath: /api
definitions:
  attendance.CheckInRequest:
    properties:
      employee_id:
        type: string
      latitude:
        type: number
      longitude:
        type: number
    required:
    - employee_id
    - latitude
    - longitude
    type: object
  attendance.CheckOutRequest:
    properties:
      employee_id:
        type: string
      latitude:
        type: number
      longitude:
        type: number
    required:
    - employee_id
    - latitude
    - longitude
    type: object
  auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  auth.RegisterRequest:
    properties:
      email:
        type: string
      name:
        maxLength: 100
        minLength: 3
        type: string
      password:
        minLength: 6
        type: string
      role:
        type: string
    required:
    - email
    - name
    - password
    type: object
  auth.Response:
    properties:
      data: {}
      error: {}
      message:
        type: string
      success:
        type: boolean
    type: object
  common.APIResponse:
    properties:
      data: {}
      error: {}
      message:
        type: string
      success:
        type: boolean
    type: object
  dashboard.DashboardResponse:
    properties:
      active_employees:
        type: integer
      departments:
        type: integer
      paid_payrolls:
        type: integer
      pending_leaves:
        type: integer
      pending_payrolls:
        type: integer
      today_absent:
        type: integer
      today_present:
        type: integer
      total_employees:
        type: integer
    type: object
  department.CreateDepartmentRequest:
    properties:
      description:
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
      status:
        type: string
    required:
    - name
    type: object
  department.UpdateDepartmentRequest:
    properties:
      description:
        type: string
      name:
        type: string
      status:
        type: string
    type: object
  employee.CreateEmployeeRequest:
    properties:
      department_id:
        type: string
      designation:
        type: string
      joining_date:
        type: string
      salary:
        type: number
      status:
        type: string
      user_id:
        type: string
    required:
    - department_id
    - designation
    - joining_date
    - user_id
    type: object
  employee.UpdateEmployeeRequest:
    properties:
      department_id:
        type: string
      designation:
        type: string
      joining_date:
        description: Added (or use time.Time)
        type: string
      salary:
        type: number
      status:
        type: string
      user_id:
        description: Added
        type: string
    type: object
  leave.CreateLeaveRequest:
    properties:
      employee_id:
        type: string
      from_date:
        type: string
      leave_type:
        type: string
      reason:
        type: string
      to_date:
        type: string
    required:
    - employee_id
    - from_date
    - leave_type
    - reason
    - to_date
    type: object
  leave.UpdateLeaveStatusRequest:
    properties:
      remarks:
        type: string
    type: object
  payroll.GeneratePayrollRequest:
    properties:
      allowances:
        type: number
      bonus:
        type: number
      deductions:
        type: number
      employee_id:
        type: string
      month:
        maximum: 12
        minimum: 1
        type: integer
      tax:
        type: number
      year:
        maximum: 2100
        minimum: 2000
        type: integer
    required:
    - employee_id
    type: object
